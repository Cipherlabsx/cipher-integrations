name: TypeScript CI

on:
  push:
    branches: [main]
    paths: ["packages/**", "package.json", "tsconfig.json"]
  pull_request:
    paths: ["packages/**", "package.json", "tsconfig.json"]

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
